language:
  prefix: '<dark_aqua>CustomDiscs <white>- '
  plugin:
    messages:
      update-available: '<white>New version available: <click:open_url:{0}{1}><hover:show_text:"<dark_aqua>{0}{1}<br><white>Click to open"><aqua>{1}</hover></click>'
  error:
    command:
      cant-perform: 'You can''t execute that command!'
      no-permission: 'No permission to perform that command!'
      unknown-extension: 'File extension must be <dark_aqua>wav<white>, <dark_aqua>flac <white>, <dark_aqua>mp3<white>, etc!'
      invalid-filename: 'Invalid filename!'
      disc-name-empty: 'You must specify the disc name.'
      no-youtube-support: 'You must download library for youtube support: <gold>https://github.com/Idiots-Foundation/lavaplayer-lib/releases'
    play:
      no-permission: 'No permissions to play that disc!'
      no-matches: 'Track not found!'
      audio-load: 'Error loading audio!'
      while-playing: 'Error while playing disc!'
      deleted-disc: 'This web-created disc was deleted and no longer works.'
    file:
      not-found: 'File not found!'
  command:
    download:
      syntax: '<dark_aqua>/cd download "<direct link>" <name.extension>'
      description: '<white>Downloads music file from URL.'
      messages:
        downloading: '<gray>Downloading file...'
        successfully: 'File successfully downloaded!'
        create-tooltip: 'Create disc, using command {0}'
        error:
          while-download: 'Error while downloading file.'
          file-too-large: 'File size larger than {0}mb.'
    reload:
      syntax: '<dark_aqua>/cd reload'
      description: '<white>Reloads configuration files.'
      messages:
        successfully: 'Plugin successfully reloaded.'
        error:
          storage: 'Failed to prepare the local audio storage.'
    create:
      local:
        syntax: '<dark_aqua>/cd create local <file name> "<disc name>"'
        description: '<white>Creates a disc with previously downloaded music.'
      remote:
        syntax: '<dark_aqua>/cd create remote "<url>" "<disc name>"'
        description: '<white>Creates a disc with music from various services (YouTube, SoundCloud).'
      messages:
        error:
          not-holding-disc: 'First, take a disc in your hand!'
          limit-reached: 'You reached your web disc limit ({0}/{1}). Use /cd delete list to remove old entries.'
        name: '<white>Disc name: <dark_aqua>{0}'
        file: '<white>Filename: <dark_aqua>{0}'
        link: '<white>Audio URL: <dark_aqua>{0}'
    delete:
      syntax: '<dark_aqua>/cd delete <id>'
      description: '<white>Deletes one tracked web-created disc by ID.'
      list:
        syntax: '<dark_aqua>/cd delete list [page]'
        description: '<white>Lists your tracked web-created discs.'
      messages:
        success: 'Deleted tracked disc <dark_aqua>{0}<white>.'
        file-missing: 'The source file was already missing: <dark_aqua>{0}'
        error:
          invalid-id: 'Invalid disc ID. Use /cd delete list and copy the UUID.'
          not-found: 'Tracked disc <dark_aqua>{0}<white> was not found.'
          not-owner: 'You do not own tracked disc <dark_aqua>{0}<white>.'
          page: 'Invalid page <dark_aqua>{0}<white>. Last page is <dark_aqua>{1}<white>.'
        list:
          empty: 'You have no tracked web-created discs.'
          header: '<white>Tracked discs page <dark_aqua>{0}<white>/<dark_aqua>{1}<white> (total: <dark_aqua>{2}<white>)'
          entry: '<dark_aqua>{0}<white> | <gray>{1}<white> | <gray>{2}<white> | <gray>{3}'
    distance:
      syntax: '<dark_aqua>/cd distance <radius>'
      description: '<white>Sets the radius for the jukebox.'
      messages:
        error:
          not-jukebox: 'You didn''t click on the jukebox'
        success: 'The radius of the jukebox was set to {0}.'
        click: 'Click on the jukebox to which you want to set the radius.'
    web:
      syntax: '<dark_aqua>/cd web'
      description: '<white>Built-in web upload tools.'
      messages:
        disabled: 'The built-in web upload server is disabled.'
        error:
          limit-reached: 'You reached your web disc creation limit.'
      token:
        syntax: '<dark_aqua>/cd web token'
        description: '<white>Generates a one-time upload link for the built-in web UI.'
        messages:
          success: '<white>Upload URL: <click:open_url:{0}><hover:show_text:"<dark_aqua>{0}<br><white>Click to open"><aqua>{0}</hover></click>'
          expiry: '<white>This link expires in <dark_aqua>{0}<white> seconds and can only be used once.'
    help:
      syntax: '<dark_aqua>/cd help'
      description: '<white>Shows command help'
      messages:
        header: '<white>Custom Discs'
        format: '{0}<white>: {1}'
        footer: 'Some arguments must be written in double quotes "string"'
  disc-name:
    simple: '<white>Custom disc'
    youtube: '<white>YouTube disc'
    soundcloud: '<white>SoundCloud disc'
  now-playing: '<gold>Now playing:'
